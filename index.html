<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Match Scoring</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 90%;
            max-width: 800px;
        }
        .alliance {
            background-color: #fff;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .alliance-name {
            font-size: 18px;
            font-weight: bold;
        }
        .score-display {
            font-size: 24px;
            margin: 10px 0;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        .button {
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .yellow { background-color: #ffeb3b; }
        .blue { background-color: #2196f3; color: white; }
        .red { background-color: #f44336; color: white; }
        .gray { background-color: #9e9e9e; color: white; }
        .button:hover {
            opacity: 0.8;
        }
        .score-container {
            font-size: 18px;
            margin-bottom: 15px;
        }
        .match-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .match-controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .match-controls button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            transition: all 0.2s;
        }
        .match-controls button:hover {
            background-color: #45a049;
        }
        .timer-container {
            text-align: center;
            margin-top: 30px;
        }
        .timer {
            font-size: 60px;
            font-weight: bold;
        }
        .timer-icon {
            font-size: 80px;
        }
        .plus-minus-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .plus-minus-button {
            padding: 8px 18px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: all 0.2s;
        }
        .plus { background-color: #4CAF50; color: white; }
        .minus { background-color: #f44336; color: white; }
        .plus-minus-button:hover {
            opacity: 0.8;
        }
        .team-names {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="match-name">
        Match Name: <input type="text" id="match-name" value="FTC Finals Match 2">
    </div>

    <div class="container">
        <!-- Alliance 1 -->
        <div class="alliance" id="alliance1">
            <div class="alliance-name">
                <div class="team-names">
                    Team 1: <input type="text" id="team1-name" value="Team 1"> | 
                    Team 2: <input type="text" id="team2-name" value="Team 2">
                </div>
                Score: <span id="score1">0</span>
            </div>
            <div class="buttons">
                <button class="button yellow" onclick="updateScore(1, 2)">Sample (+2)</button>
                <button class="button red" onclick="updateScore(1, 6)">Specimen (Low Bar) (+6)</button>
                <button class="button red" onclick="updateScore(1, 10)">Specimen (High Bar) (+10)</button>
                <button class="button yellow" onclick="updateScore(1, 4)">Sample (Low Basket) (+4)</button>
                <button class="button yellow" onclick="updateScore(1, 8)">Sample (High Basket) (+8)</button>
                <button class="button gray" onclick="updateScore(1, 3)">Ascent 1 (+3)</button>
                <button class="button gray" onclick="updateScore(1, 15)">Ascent 2 (+15)</button>
                <button class="button gray" onclick="updateScore(1, 30)">Ascent 3 (+30)</button>
            </div>
        </div>

        <!-- Alliance 2 -->
        <div class="alliance" id="alliance2">
            <div class="alliance-name">
                <div class="team-names">
                    Team 3: <input type="text" id="team3-name" value="Team 3"> | 
                    Team 4: <input type="text" id="team4-name" value="Team 4">
                </div>
                Score: <span id="score2">0</span>
            </div>
            <div class="buttons">
                <button class="button yellow" onclick="updateScore(2, 2)">Sample (+2)</button>
                <button class="button red" onclick="updateScore(2, 6)">Specimen (Low Bar) (+6)</button>
                <button class="button red" onclick="updateScore(2, 10)">Specimen (High Bar) (+10)</button>
                <button class="button yellow" onclick="updateScore(2, 4)">Sample (Low Basket) (+4)</button>
                <button class="button yellow" onclick="updateScore(2, 8)">Sample (High Basket) (+8)</button>
                <button class="button gray" onclick="updateScore(2, 3)">Ascent 1 (+3)</button>
                <button class="button gray" onclick="updateScore(2, 15)">Ascent 2 (+15)</button>
                <button class="button gray" onclick="updateScore(2, 30)">Ascent 3 (+30)</button>
            </div>
        </div>
    </div>

    <div class="timer-container">
        <div id="timer" class="timer">0:30</div>
        <div id="timer-icon" class="timer-icon">🤖</div>
        <div class="match-controls">
            <button onclick="startMatch()">Start</button>
            <button onclick="pauseMatch()">Pause</button>
            <button onclick="stopMatch()">Stop</button>
        </div>
    </div>

    <div class="plus-minus-buttons">
        <button class="plus-minus-button plus" onclick="adjustScore(1, 1)">+</button>
        <button class="plus-minus-button minus" onclick="adjustScore(1, -1)">-</button>
        <button class="plus-minus-button plus" onclick="adjustScore(2, 1)">+</button>
        <button class="plus-minus-button minus" onclick="adjustScore(2, -1)">-</button>
    </div>

    <script>
        let alliance1Score = 0;
        let alliance2Score = 0;
        let alliance1AscentCount = 0;
        let alliance2AscentCount = 0;
        let isAutonComplete = false; // Track auton period completion
        let timerInterval;
        let timerSeconds = 30;
        let currentPeriod = 'Auton'; // Start with the Auton period

        // Update score based on actions
        function updateScore(alliance, points) {
            if (alliance === 1) {
                if (currentPeriod === 'Switch') {
                    points *= 2; // Double points in Switch period
                }
                if (points === 3 || points === 15 || points === 30) { // Ascent points
                    if (alliance1AscentCount < 2) {
                        alliance1Score += points;
                        alliance1AscentCount++;
                    } else {
                        alert('Max Ascent points reached for Alliance 1!');
                    }
                } else {
                    alliance1Score += points;
                }
                document.getElementById('score1').textContent = alliance1Score;
            } else if (alliance === 2) {
                if (currentPeriod === 'Switch') {
                    points *= 2; // Double points in Switch period
                }
                if (points === 3 || points === 15 || points === 30) { // Ascent points
                    if (alliance2AscentCount < 2) {
                        alliance2Score += points;
                        alliance2AscentCount++;
                    } else {
                        alert('Max Ascent points reached for Alliance 2!');
                    }
                } else {
                    alliance2Score += points;
                }
                document.getElementById('score2').textContent = alliance2Score;
            }
        }

        // Adjust scores for both teams (plus and minus)
        function adjustScore(alliance, adjustment) {
            if (alliance === 1) {
                alliance1Score += adjustment;
                document.getElementById('score1').textContent = alliance1Score;
            } else if (alliance === 2) {
                alliance2Score += adjustment;
                document.getElementById('score2').textContent = alliance2Score;
            }
        }

        // Start the match timer
        function startMatch() {
            if (currentPeriod === 'Auton') {
                timerSeconds = 30; // Auton period
            } else if (currentPeriod === 'Switch') {
                timerSeconds = 20; // Switch period
            } else if (currentPeriod === 'Teleop') {
                timerSeconds = 60; // Teleop period
            }

            if (timerInterval) {
                clearInterval(timerInterval); // Clear existing interval if any
            }

            timerInterval = setInterval(function () {
                timerSeconds--;
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    nextPeriod();
                }
                updateTimerDisplay();
            }, 1000);
        }

        // Update the timer on the screen
        function updateTimerDisplay() {
            let minutes = Math.floor(timerSeconds / 60);
            let seconds = timerSeconds % 60;
            document.getElementById('timer').textContent = `${minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
        }

        // Pause the match timer
        function pauseMatch() {
            clearInterval(timerInterval);
        }

        // Stop the match and reset everything
        function stopMatch() {
            clearInterval(timerInterval);
            alliance1Score = 0;
            alliance2Score = 0;
            alliance1AscentCount = 0;
            alliance2AscentCount = 0;
            document.getElementById('score1').textContent = alliance1Score;
            document.getElementById('score2').textContent = alliance2Score;
            currentPeriod = 'Auton';
            updateTimerDisplay();
        }

        // Move to the next period (Auton -> Switch -> Teleop)
        function nextPeriod() {
            if (currentPeriod === 'Auton') {
                currentPeriod = 'Switch';
            } else if (currentPeriod === 'Switch') {
                currentPeriod = 'Teleop';
            } else {
                currentPeriod = 'Auton';
            }
            startMatch(); // Restart the timer with the new period
        }
    </script>
</body>
</html>
