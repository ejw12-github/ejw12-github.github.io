<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Match Scoring</title>
    <script>
        alert("Use this for team practice ONLY!");
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .alliance {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .alliance-name {
            font-size: 20px;
            font-weight: bold;
        }
        .score-display {
            font-size: 30px;
            margin: 10px 0;
        }
        .buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        .yellow { background-color: yellow; }
        .blue { background-color: blue; color: white; }
        .red { background-color: red; color: white; }
        .gray { background-color: gray; }
        .score-container {
            font-size: 24px;
            margin-bottom: 15px;
        }
        .match-name {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .plus-minus-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .plus-minus-button {
            padding: 8px 15px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .plus { background-color: #4CAF50; color: white; }
        .minus { background-color: #f44336; color: white; }
    </style>
</head>
<body>

    <div class="match-name">
        Match Name: <input type="text" id="match-name" value="FTC Finals Match 2">
    </div>

    <div class="container">
        <!-- Alliance 1 -->
        <div class="alliance" id="alliance1">
            <div class="alliance-name">Alliance 1</div>
            <div class="score-container">
                Score: <span id="score1">0</span>
            </div>
            <div class="buttons">
                <button class="button yellow" onclick="updateScore(1, 2)">Sample (2 points)</button>
                <button class="button blue" onclick="updateScore(1, 6)">Specimen (Low Bar 6 points)</button>
                <button class="button gray" onclick="updateScore(1, 3)">Ascent 1 (3 points)</button>
            </div>
            <div class="plus-minus-buttons">
                <button class="plus-minus-button plus" onclick="adjustScore(1, 1)">+</button>
                <button class="plus-minus-button minus" onclick="adjustScore(1, -1)">-</button>
            </div>
        </div>

        <!-- Alliance 2 -->
        <div class="alliance" id="alliance2">
            <div class="alliance-name">Alliance 2</div>
            <div class="score-container">
                Score: <span id="score2">0</span>
            </div>
            <div class="buttons">
                <button class="button yellow" onclick="updateScore(2, 2)">Sample (2 points)</button>
                <button class="button blue" onclick="updateScore(2, 6)">Specimen (Low Bar 6 points)</button>
                <button class="button gray" onclick="updateScore(2, 3)">Ascent 1 (3 points)</button>
            </div>
            <div class="plus-minus-buttons">
                <button class="plus-minus-button plus" onclick="adjustScore(2, 1)">+</button>
                <button class="plus-minus-button minus" onclick="adjustScore(2, -1)">-</button>
            </div>
        </div>
    </div>

    <script>
        let alliance1Score = 0;
        let alliance2Score = 0;
        let isAutonComplete = false; // To track if the Auton period is over and sample/specimen points are doubled

        // Update score based on actions
        function updateScore(alliance, points) {
            if (alliance === 1) {
                if (isAutonComplete) points *= 2;
                alliance1Score += points;
                document.getElementById('score1').innerText = alliance1Score;
            } else if (alliance === 2) {
                if (isAutonComplete) points *= 2;
                alliance2Score += points;
                document.getElementById('score2').innerText = alliance2Score;
            }
        }

        // Adjust score with +/- buttons
        function adjustScore(alliance, change) {
            if (alliance === 1) {
                alliance1Score += change;
                document.getElementById('score1').innerText = alliance1Score;
            } else if (alliance === 2) {
                alliance2Score += change;
                document.getElementById('score2').innerText = alliance2Score;
            }
        }

        // Simulate the end of the Auton period and doubling sample/specimen points
        function endAuton() {
            isAutonComplete = true;
        }

        // Reset the match
        function resetMatch() {
            alliance1Score = 0;
            alliance2Score = 0;
            document.getElementById('score1').innerText = alliance1Score;
            document.getElementById('score2').innerText = alliance2Score;
            isAutonComplete = false;
        }
    </script>
</body>
</html>
