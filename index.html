<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Into the Deep Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
    </div>
    <div class="timer" id="timer">2:30</div>
    <div class="container">
        <div class="match-info">
            <input type="text" id="match-name" value="Finals Match 2">
        </div>
        <div class="alliances">
            <div class="alliance" id="alliance1">
                <h2>Alliance 1</h2>
                <div class="team">
                    <input type="text" class="team-number" id="team1" value="-1">
                </div>
                <div class="team">
                    <input type="text" class="team-number" id="team2" value="-2">
                </div>
                <div class="score">
                    <button class="minus" data-score="score1">-</button>
                    <span class="score-value" id="score1">0</span>
                    <button class="plus" data-score="score1">+</button>
                </div>
            </div>
            <div class="alliance" id="alliance2">
                <h2>Alliance 2</h2>
                <div class="team">
                    <input type="text" class="team-number" id="team3" value="-3">
                </div>
                <div class="team">
                    <input type="text" class="team-number" id="team4" value="-4">
                </div>
                <div class="score">
                    <button class="minus" data-score="score2">-</button>
                    <span class="score-value" id="score2">0</span>
                    <button class="plus" data-score="score2">+</button>
                </div>
            </div>
        </div>
        <div class="scoring-buttons">
            <h3>Scoring</h3>
            <button class="score-button" data-points="2" data-description="samples (net zone)">Samples (Net Zone)</button>
            <button class="score-button" data-points="4" data-description="samples (low basket)">Samples (Low Basket)</button>
            <button class="score-button" data-points="8" data-description="samples (high basket)">Samples (High Basket)</button>
            <button class="score-button" data-points="6" data-description="specimens (low bar)">Specimens (Low Bar)</button>
            <button class="score-button" data-points="10" data-description="specimens (high bar)">Specimens (High Bar)</button>
            <button class="score-button" data-points="3" data-description="ascent 1">Ascent 1</button>
            <button class="score-button" data-points="3" data-description="observation zone">Observation Zone</button>
            <button class="score-button teleop-only" data-points="15" data-description="ascent 2">Ascent 2</button>
            <button class="score-button teleop-only" data-points="30" data-description="ascent 3">Ascent 3</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
