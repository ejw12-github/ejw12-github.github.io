<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Into the Deep Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script>
        alert("This calculator is for team practice or scrimmage matches ONLY. Do not use this at official events. Press OK to proceed and accept.");
    </script>
</head>
<body>
    <div class="header">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
    </div>
    <div class="timer" id="timer">2:30</div>
    <div class="container">
        <div class="match-info">
            <input type="text" id="match-name" value="Finals Match 2">
        </div>
        <div class="alliances">
            <div class="alliance" id="alliance1">
                <h2>Alliance 1</h2>
                <div class="team">
                    <input type="text" class="team-number" id="team1" value="-1">
                </div>
                <div class="team">
                    <input type="text" class="team-number" id="team2" value="-2">
                </div>
                <div class="score">
                    <button class="minus" data-score="score1">-</button>
                    <span class="score-value" id="score1">0</span>
                    <button class="plus" data-score="score1">+</button>
                </div>
            </div>
            <div class="alliance" id="alliance2">
                <h2>Alliance 2</h2>
                <div class="team">
                    <input type="text" class="team-number" id="team3" value="-3">
                </div>
                <div class="team">
                    <input type="text" class="team-number" id="team4" value="-4">
                </div>
                <div class="score">
                    <button class="minus" data-score="score2">-</button>
                    <span class="score-value" id="score2">0</span>
                    <button class="plus" data-score="score2">+</button>
                </div>
            </div>
        </div>
        <div class="scoring-buttons">
            <h3>Scoring</h3>
            <button class="score-button" data-points="2" data-description="samples (net zone)" data-alliance="1">Samples (Net Zone) Alliance 1</button>
            <button class="score-button" data-points="2" data-description="samples (net zone)" data-alliance="2">Samples (Net Zone) Alliance 2</button>
            <button class="score-button" data-points="4" data-description="samples (low basket)" data-alliance="1">Samples (Low Basket) Alliance 1</button>
            <button class="score-button" data-points="4" data-description="samples (low basket)" data-alliance="2">Samples (Low Basket) Alliance 2</button>
            <button class="score-button" data-points="8" data-description="samples (high basket)" data-alliance="1">Samples (High Basket) Alliance 1</button>
            <button class="score-button" data-points="8" data-description="samples (high basket)" data-alliance="2">Samples (High Basket) Alliance 2</button>
            <button class="score-button" data-points="6" data-description="specimens (low bar)" data-alliance="1">Specimens (Low Bar) Alliance 1</button>
            <button class="score-button" data-points="6" data-description="specimens (low bar)" data-alliance="2">Specimens (Low Bar) Alliance 2</button>
            <button class="score-button" data-points="10" data-description="specimens (high bar)" data-alliance="1">Specimens (High Bar) Alliance 1</button>
            <button class="score-button" data-points="10" data-description="specimens (high bar)" data-alliance="2">Specimens (High Bar) Alliance 2</button>
            <button class="score-button" data-points="3" data-description="ascent 1" data-alliance="1">Ascent 1 Alliance 1</button>
            <button class="score-button" data-points="3" data-description="ascent 1" data-alliance="2">Ascent 1 Alliance 2</button>
            <button class="score-button" data-points="3" data-description="observation zone" data-alliance="1">Observation Zone Alliance 1</button>
            <button class="score-button" data-points="3" data-description="observation zone" data-alliance="2">Observation Zone Alliance 2</button>
            <button class="score-button teleop-only" data-points="15" data-description="ascent 2" data-alliance="1">Ascent 2 Alliance 1</button>
            <button class="score-button teleop-only" data-points="15" data-description="ascent 2" data-alliance="2">Ascent 2 Alliance 2</button>
            <button class="score-button teleop-only" data-points="30" data-description="ascent 3" data-alliance="1">Ascent 3 Alliance 1</button>
            <button class="score-button teleop-only" data-points="30" data-description="ascent 3" data-alliance="2">Ascent 3 Alliance 2</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
