<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Into the Deep Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
    </div>
    <div class="timer" id="timer">2:30</div>
    <div class="container">
        <div class="match-info">
            <input type="text" id="match-name" value="Finals Match 2">
        </div>
        <div class="alliances">
            <div class="alliance" id="blue-alliance">
                <h2>Alliance CURE2</h2>
                <div class="team">
                    <input type="text" class="team-number" id="team1" value="11228">
                    <div class="score">
                        <button class="minus" data-score="score1">-</button>
                        <span class="score-value" id="score1">0</span>
                        <button class="plus" data-score="score1">+</button>
                    </div>
                </div>
                <div class="team">
                    <input type="text" class="team-number" id="team2" value="8533">
                    <div class="score">
                        <button class="minus" data-score="score2">-</button>
                        <span class="score-value" id="score2">0</span>
                        <button class="plus" data-score="score2">+</button>
                    </div>
                </div>
            </div>
            <div class="alliance" id="red-alliance">
                <h2>Alliance FLWR1</h2>
                <div class="team">
                    <input type="text" class="team-number" id="team3" value="10644">
                    <div class="score">
                        <button class="minus" data-score="score3">-</button>
                        <span class="score-value" id="score3">0</span>
                        <button class="plus" data-score="score3">+</button>
                    </div>
                </div>
                <div class="team">
                    <input type="text" class="team-number" id="team4" value="10255">
                    <div class="score">
                        <button class="minus" data-score="score4">-</button>
                        <span class="score-value" id="score4">0</span>
                        <button class="plus" data-score="score4">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
